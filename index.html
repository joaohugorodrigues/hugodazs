<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hugo da ZS | Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CONFIGURAÇÕES GERAIS - CORES: AZUL BEBÊ (#A2D2FF) E PRETO */
        :root {
            --azul-bebe: #A2D2FF;
            --preto: #000000;
            --cinza-escuro: #121212;
            --branco: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--preto);
            color: var(--branco);
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* HEADER */
        header {
            padding: 25px 0;
            border-bottom: 1px solid rgba(162, 210, 255, 0.2);
            background-color: var(--preto);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: var(--azul-bebe);
            font-size: 1.5rem;
            letter-spacing: 3px;
            font-weight: 900;
        }

        nav a {
            color: var(--branco);
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--azul-bebe);
        }

        /* HERO SECTION */
        .hero {
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.85), var(--preto)), url('https://images.unsplash.com/photo-1493225255756-d9584f8606e9?q=80&w=2070');
            background-size: cover;
            background-position: center;
            border-bottom: 2px solid var(--azul-bebe);
        }

        .tag {
            color: var(--azul-bebe);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 5px;
        }

        .hero h2 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            margin: 15px 0;
